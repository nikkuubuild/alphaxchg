<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaXchng — Premium ID Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#030303;color:#fff;overflow-x:hidden;--ac:139,195,74;--ac-hex:var(--ac-hex);--ac-dark:var(--ac-dark)}
body[data-theme="cyber-purple"]{--ac:168,85,247;--ac-hex:#A855F7;--ac-dark:#7C3AED}
body[data-theme="ocean-blue"]{--ac:59,130,246;--ac-hex:#3B82F6;--ac-dark:#2563EB}
body[data-theme="sunset-fire"]{--ac:249,115,22;--ac-hex:#F97316;--ac-dark:#EA580C}
body[data-theme="gold-premium"]{--ac:234,179,8;--ac-hex:#EAB308;--ac-dark:#CA8A04}
body[data-theme="royal-purple"]{--ac:147,130,220;--ac-hex:#9382DC;--ac-dark:#7C6BC4;background:#1a0e2e;color:#f0edf7}
body[data-theme="royal-purple"]::before{background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(147,130,220,0.12),transparent),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(107,79,187,0.08),transparent)}
body[data-theme="royal-purple"]::after{background:linear-gradient(0deg,rgba(147,130,220,0.04) 0%,transparent 15%),linear-gradient(180deg,rgba(147,130,220,0.04) 0%,transparent 15%),linear-gradient(90deg,rgba(147,130,220,0.05) 0%,transparent 20%),linear-gradient(270deg,rgba(147,130,220,0.05) 0%,transparent 20%);box-shadow:inset 0 0 120px rgba(147,130,220,0.04),inset 0 0 60px rgba(147,130,220,0.03)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(var(--ac),0.06),transparent);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");opacity:0.04;mix-blend-mode:overlay}
.page{width:100%;max-width:460px;margin:0 auto;padding:0 16px 24px;position:relative;z-index:1}

/* ── Typography Enhancements ── */
.section-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;letter-spacing:-0.4px;background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,0.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn-title{font-size:14px;font-weight:700;color:rgba(255,255,255,0.95);display:block;letter-spacing:-0.3px;font-family:'Space Grotesk',sans-serif;background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,0.8) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── Reveal Animations ── */
.reveal{opacity:0;transform:translateY(24px);transition:all 0.8s cubic-bezier(0.22,1,0.36,1);will-change:transform,opacity}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--ac-hex),var(--ac-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#000;box-shadow:0 0 20px rgba(var(--ac),0.25)}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 60%,rgba(255,255,255,0.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-text span{-webkit-text-fill-color:var(--ac-hex)}
.get-btn{background:linear-gradient(135deg,var(--ac-hex),var(--ac-dark));color:#000;border:none;border-radius:10px;padding:10px 22px;font-size:16add px;font-weight:900;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px rgba(var(--ac),0.2);position:relative;overflow:hidden}
.get-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,0.15));opacity:0;transition:opacity 0.3s}
.get-btn:hover::before{opacity:1}
.get-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(var(--ac),0.35)}
.get-btn:active{transform:translateY(0)}

/* ── Status Bar ── */
.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:8px 14px;background:rgba(var(--ac),0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;width:fit-content;box-shadow:0 0 12px rgba(255,255,255,0.02)}
.status-dot{width:7px;height:7px;background:var(--ac-hex);border-radius:50%;animation:pulseGlow 2s infinite;box-shadow:0 0 8px rgba(var(--ac),0.5)}
.status-text{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:0.3px}
.status-text strong{color:rgba(var(--ac),0.8);font-weight:700}

/* ── Top Marquee ── */
:root{--marquee-speed:30s;--slider-ring-speed:20s;--vertical-speed:18s}
.marquee-wrap{overflow:hidden;background:linear-gradient(135deg,rgba(20,20,20,0.9),rgba(10,10,10,0.9));border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:12px 0;margin-bottom:40px;position:relative;backdrop-filter:blur(10px);box-shadow:0 0 15px rgba(255,255,255,0.03),inset 0 0 15px rgba(255,255,255,0.02)}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:40px;z-index:2;pointer-events:none}
.marquee-wrap::before{left:0;background:linear-gradient(90deg,rgba(10,10,10,0.9),transparent)}
.marquee-wrap::after{right:0;background:linear-gradient(270deg,rgba(10,10,10,0.9),transparent)}
.marquee-inner{display:flex;gap:48px;animation:scrollLeft var(--marquee-speed) linear infinite;width:max-content}
.marquee-inner span{white-space:nowrap;font-size:11px;font-weight:500;color:rgba(255,255,255,0.3);letter-spacing:0.8px;text-transform:uppercase;animation:pulseGlow 3s ease-in-out infinite;text-shadow:0 0 8px rgba(var(--ac),0.5)}
.marquee-inner span .hl{color:var(--ac-hex);font-weight:700;text-shadow:0 0 12px rgba(var(--ac),0.8)}
.marquee-inner span .sep{color:rgba(255,255,255,0.08);margin:0 12px}

/* ── Slider Section ── */
.slider-section{margin-bottom:24px}
.slider-frame{position:relative;display:flex;align-items:center;justify-content:center;padding:0 16px}

/* ── Marquee Ring (rounded frame around slider) ── */
.slider-outer{position:relative;width:100%;max-width:380px;aspect-ratio:1/1;margin:32px auto}

.marquee-ring{position:absolute;inset:-32px;border-radius:30px;overflow:hidden;pointer-events:none;z-index:2;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.01);box-shadow:0 0 20px rgba(255,255,255,0.03),inset 0 0 20px rgba(255,255,255,0.02)}

/* Top / Bottom tracks */
.mq-top,.mq-bottom{position:absolute;left:0;right:0;height:32px;overflow:hidden;display:flex;align-items:center}
.mq-top{top:0}
.mq-bottom{bottom:0}
.mq-top .track,.mq-bottom .track{display:flex;gap:32px;animation:scrollLeft var(--slider-ring-speed) linear infinite;width:max-content}
.mq-top .track span,.mq-bottom .track span{font-size:10px;font-weight:600;color:rgba(255,255,255,0.45);white-space:nowrap;letter-spacing:1.5px;text-transform:uppercase;animation:pulseGlow 3.5s ease-in-out infinite;text-shadow:0 0 10px rgba(var(--ac),0.6)}
.mq-top .track span .hl,.mq-bottom .track span .hl{color:rgba(var(--ac),0.85);font-weight:700;text-shadow:0 0 15px rgba(var(--ac),0.9)}
.mq-top .track span .dot,.mq-bottom .track span .dot{color:rgba(255,255,255,0.06)}
.mq-bottom .track{animation-direction:reverse}

/* Left / Right tracks */
.mq-left,.mq-right{position:absolute;top:0;bottom:0;width:32px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.mq-left{left:0}
.mq-right{right:0}
.mq-left .marquee-v-track,.mq-right .marquee-v-track{display:flex;flex-direction:column;gap:28px;animation:scrollVertical var(--vertical-speed) linear infinite;width:max-content}
.mq-right .marquee-v-track{animation-direction:reverse}
.mq-left .marquee-v-track span,.mq-right .marquee-v-track span{font-size:9px;font-weight:700;color:rgba(255,255,255,0.45);writing-mode:vertical-rl;text-orientation:mixed;letter-spacing:4px;white-space:nowrap;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;animation:pulseGlow 3.5s ease-in-out infinite;text-shadow:0 0 10px rgba(var(--ac),0.6)}
.mq-left .marquee-v-track span .hl,.mq-right .marquee-v-track span .hl{color:rgba(var(--ac),0.85);font-weight:700;text-shadow:0 0 15px rgba(var(--ac),0.9)}

/* Subtle glow on the ring corners */
.marquee-ring::before{content:'';position:absolute;inset:0;border-radius:30px;background:radial-gradient(ellipse at top left,rgba(var(--ac),0.08),transparent 50%),radial-gradient(ellipse at bottom right,rgba(var(--ac),0.08),transparent 50%);pointer-events:none}

/* ── Slider inside the ring ── */
.slider-border{position:relative;width:100%;height:100%;border-radius:16px}
.slider-border::before{content:'';position:absolute;inset:-3px;border-radius:20px;background:linear-gradient(135deg,rgba(var(--ac),0.15),rgba(var(--ac),0.02),rgba(var(--ac),0.1));z-index:0;animation:borderGlow 4s ease-in-out infinite alternate}
@keyframes borderGlow{0%{opacity:0.5}100%{opacity:1}}

.slider-container{width:100%;height:100%;border-radius:16px;overflow:hidden;position:relative;background:#080808;border:1px solid rgba(255,255,255,0.1);z-index:1;box-shadow:0 0 15px rgba(255,255,255,0.03)}
.slider-container img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;opacity:0;transition:opacity 0.8s cubic-bezier(.22,1,.36,1),transform 1s cubic-bezier(.22,1,.36,1);transform:scale(1.05)}
.slider-container img.active{opacity:1;transform:scale(1)}

/* Slider dots */
.slider-dots{display:flex;justify-content:center;gap:6px;margin-top:12px}
.slider-dots .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.1);cursor:pointer;transition:all 0.4s}
.slider-dots .dot.active{width:20px;border-radius:3px;background:var(--ac-hex);box-shadow:0 0 10px rgba(var(--ac),0.3)}

@keyframes scrollLeft{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes scrollVertical{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
@keyframes pulseGlow{0%,100%{opacity:1;box-shadow:0 0 8px rgba(var(--ac),0.5)}50%{opacity:0.6;box-shadow:0 0 16px rgba(var(--ac),0.8)}}

/* ── Section Headers ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-head-left{display:flex;align-items:center;gap:10px}
.section-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:4px 10px}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.section-title span{color:var(--ac-hex)}
.section-count{font-size:11px;font-weight:600;color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.03);padding:4px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04)}

/* ── Number Tabs ── */
.tabs-card{background:linear-gradient(135deg,rgba(15,15,15,0.95),rgba(8,8,8,0.95));border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:18px;backdrop-filter:blur(10px);box-shadow:0 0 20px rgba(255,255,255,0.03),inset 0 0 20px rgba(255,255,255,0.02)}
.btn-grid{display:flex;flex-direction:column;gap:8px}
.wa-btn{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);cursor:pointer;transition:all 0.3s cubic-bezier(.22,1,.36,1);text-decoration:none;position:relative;overflow:hidden;box-shadow:0 0 10px rgba(255,255,255,0.02)}
.wa-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(var(--ac),0.03),transparent);opacity:0;transition:opacity 0.3s}
.wa-btn:hover::before{opacity:1}
.wa-btn:hover{border-color:rgba(var(--ac),0.15);transform:translateY(-1px);box-shadow:0 8px 25px rgba(0,0,0,0.3)}
.wa-btn:active{transform:translateY(0) scale(0.99)}
.wa-btn .badge{position:absolute;top:8px;right:8px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:rgba(var(--ac),0.5);background:rgba(var(--ac),0.06);padding:2px 8px;border-radius:4px;border:1px solid rgba(var(--ac),0.08)}
.btn-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;position:relative}
.btn-icon svg{width:20px;height:20px;stroke:currentColor}
.btn-icon::after{content:'';position:absolute;inset:0;border-radius:10px;border:1px solid rgba(255,255,255,0.04)}
.btn-text{flex:1;text-align:left}
.btn-title{font-size:14px;font-weight:700;color:rgba(255,255,255,0.9);display:block;letter-spacing:-0.2px;font-family:'Space Grotesk',sans-serif}
.btn-desc{font-size:11px;color:rgba(255,255,255,0.25);font-weight:500;margin-top:2px;display:block}
.btn-arrow{color:rgba(255,255,255,0.1);font-size:18px;transition:all 0.3s;font-weight:300;font-family:'Inter',sans-serif}
.wa-btn:hover .btn-arrow{color:var(--ac-hex);transform:translateX(4px)}

/* ── Payment Methods ── */
.payment-section{margin:16px 0}
.payment-wrap{background:linear-gradient(135deg,rgba(15,15,15,0.95),rgba(8,8,8,0.95));border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:14px 0;position:relative;backdrop-filter:blur(10px);overflow:hidden;box-shadow:0 0 15px rgba(255,255,255,0.03),inset 0 0 15px rgba(255,255,255,0.02)}
.payment-wrap::before,.payment-wrap::after{content:'';position:absolute;top:0;bottom:0;width:40px;z-index:2;pointer-events:none}
.payment-wrap::before{left:0;background:linear-gradient(90deg,rgba(8,8,8,0.95),transparent)}
.payment-wrap::after{right:0;background:linear-gradient(270deg,rgba(8,8,8,0.95),transparent)}
.payment-track{display:flex;gap:36px;animation:scrollLeft 28s linear infinite;width:max-content;align-items:center}
.payment-track img{height:26px;width:auto;opacity:0.5;filter:grayscale(1);transition:all 0.4s;animation:pulseGlow 3s ease-in-out infinite;box-shadow:0 0 12px rgba(var(--ac),0.4)}
.payment-track img:hover{opacity:1;filter:grayscale(0);animation:none;box-shadow:0 0 25px rgba(var(--ac),0.8),0 0 50px rgba(var(--ac),0.4)}
.payment-track span{font-size:11px;font-weight:600;color:rgba(255,255,255,0.15);white-space:nowrap;letter-spacing:2px;text-transform:uppercase;font-family:'Space Grotesk',sans-serif}
.payment-label{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#030303;padding:0 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.15);z-index:3}

/* ── Services Section ── */
.services-section{margin:24px 0}
.services-container{position:relative;border-radius:18px;background:linear-gradient(135deg,rgba(15,15,15,0.95),rgba(8,8,8,0.95));border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(10px);box-shadow:0 0 20px rgba(255,255,255,0.03),inset 0 0 20px rgba(255,255,255,0.02);overflow:hidden}
.services-header{padding:16px 16px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06)}
.services-header-left{display:flex;align-items:center;gap:8px}
.services-header-left .sh-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,rgba(var(--ac),0.15),rgba(var(--ac),0.05));border:1px solid rgba(var(--ac),0.15);display:flex;align-items:center;justify-content:center;font-size:13px}
.services-header-left .sh-text{font-size:13px;font-weight:700;letter-spacing:-0.2px;color:rgba(255,255,255,0.8);font-family:'Space Grotesk',sans-serif}
.services-header-left .sh-text span{color:var(--ac-hex)}
.services-dots{display:flex;gap:6px;align-items:center}
.services-dots .s-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all 0.4s;cursor:pointer}
.services-dots .s-dot.active{width:20px;border-radius:3px;background:var(--ac-hex);box-shadow:0 0 10px rgba(var(--ac),0.3)}
.services-wrapper{position:relative;overflow:hidden;width:100%;touch-action:none;-webkit-overflow-scrolling:auto}
.services-track{display:flex;width:100%;transition:transform 0.45s cubic-bezier(0.22,1,0.36,1);will-change:transform}
.services-track.dragging{transition:none}
.services-page{min-width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.services-card{background:linear-gradient(160deg,rgba(25,25,25,0.95),rgba(12,12,12,0.95));padding:22px 14px 18px;border-radius:14px;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:130px;justify-content:center;text-align:center;border:1px solid rgba(255,255,255,0.08);position:relative;overflow:hidden;user-select:none;transition:border-color 0.3s,box-shadow 0.3s}
.services-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,rgba(var(--ac),0.4),transparent);border-radius:0 0 4px 4px;opacity:0;transition:opacity 0.3s}
.services-card::after{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(ellipse at 50% -20%,rgba(var(--ac),0.08),transparent 70%);opacity:0;transition:opacity 0.3s;pointer-events:none}
.services-card:hover{border-color:rgba(var(--ac),0.15);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.services-card:hover::before{opacity:1}
.services-card:hover::after{opacity:1}
.services-card .icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 2px 8px rgba(var(--ac),0.2));color:var(--ac-hex)}
.services-card .icon svg{width:100%;height:100%;stroke:currentColor}
.services-card .title{font-size:12px;font-weight:700;letter-spacing:0.5px;color:rgba(255,255,255,0.9);text-transform:uppercase;font-family:'Space Grotesk',sans-serif;line-height:1.3}
.services-card .desc{font-size:10px;color:rgba(255,255,255,0.35);line-height:1.5;font-weight:500;max-width:95%}
@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}

/* ── Footer ── */
.footer{background:linear-gradient(135deg,rgba(15,15,15,0.95),rgba(8,8,8,0.95));border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:20px;margin-top:8px;backdrop-filter:blur(10px);box-shadow:0 0 20px rgba(255,255,255,0.03),inset 0 0 20px rgba(255,255,255,0.02)}
.footer-grid{display:flex;flex-direction:row;gap:10px}
.footer-item{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);background:rgba(255,255,255,0.02);text-decoration:none;transition:all 0.3s;flex:1;text-align:center}
.footer-item:hover{transform:translateY(-2px)}
.footer-item .fi-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:all 0.3s}
.footer-item .fi-icon svg{width:22px;height:22px;transition:all 0.3s}
.footer-item .fi-icon::after{content:'';position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,255,255,0.06);transition:all 0.3s}
.footer-item .fi-text{flex:1}
.footer-item .fi-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);display:block;font-family:'Space Grotesk',sans-serif;transition:color 0.3s}
.footer-item .fi-sub{font-size:9px;color:rgba(255,255,255,0.2);font-weight:500;display:block;margin-top:2px}
.footer-item .fi-arrow{display:none}
.footer-item[data-brand="telegram"] .fi-icon svg{fill:rgba(38,165,218,0.4)}
.footer-item[data-brand="telegram"] .fi-icon{background:rgba(38,165,218,0.06)}
.footer-item[data-brand="telegram"] .fi-icon::after{border-color:rgba(38,165,218,0.1)}
.footer-item[data-brand="telegram"]:hover .fi-icon svg{fill:#26A5DA}
.footer-item[data-brand="telegram"]:hover .fi-icon{background:rgba(38,165,218,0.12)}
.footer-item[data-brand="telegram"]:hover .fi-icon::after{border-color:rgba(38,165,218,0.3)}
.footer-item[data-brand="telegram"]:hover{border-color:rgba(38,165,218,0.15);background:rgba(38,165,218,0.03)}
.footer-item[data-brand="telegram"]:hover .fi-label{color:#26A5DA}

<script>
// ═════════════════════════════════════════════════════════════════════
//  FALLBACK DEFAULTS (used when API is unreachable)
// ═════════════════════════════════════════════════════════════════════

var NUMBERS = ['8651381149', '7542943418', '8235817872', '9472194303'];
var COUNTRY = '91';

// ═════════════════════════════════════════════════════════════════════
//  FETCH DATA FROM BACKEND
// ═════════════════════════════════════════════════════════════════════

function buildMarquee(id, items) {
  var el = document.getElementById(id);
  if (!el) return;
  var doubled = items.concat(items);
  var html = '';
  for (var i = 0; i < doubled.length; i++) {
    var item = doubled[i];
    var text = typeof item === 'object' ? item.text : item;
    var color = typeof item === 'object' && item.color ? item.color : '';
    var style = color ? ' style="color:' + color + '"' : '';
    html += '<span' + style + '>' + (i > 0 && items.length > 0 ? '<span class="dot">✦</span> ' : '') + text + '</span>';
  }
  el.innerHTML = html;
}

function initSlider(images) {
  var c = document.getElementById('sliderContainer');
  var d = document.getElementById('sliderDots');
  if (!c || !images.length) return;
  var html = '', dots = '';
  for (var i = 0; i < images.length; i++) {
    html += '<img src="' + images[i] + '" class="' + (i === 0 ? 'active' : '') + '" alt="slide ' + (i+1) + '">';
    dots += '<div class="dot' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '"></div>';
  }
  c.innerHTML = html;
  d.innerHTML = dots;

  var current = 0, imgs = c.querySelectorAll('img'), dotsEl = d.querySelectorAll('.dot');
  if (!imgs.length) return;
  var interval = setInterval(function() {
    imgs[current].classList.remove('active');
    dotsEl[current].classList.remove('active');
    current = (current + 1) % imgs.length;
    imgs[current].classList.add('active');
    dotsEl[current].classList.add('active');
  }, 4000);

  d.addEventListener('click', function(e) {
    var idx = e.target.getAttribute('data-idx');
    if (idx === null) return;
    clearInterval(interval);
    imgs[current].classList.remove('active');
    dotsEl[current].classList.remove('active');
    current = parseInt(idx);
    imgs[current].classList.add('active');
    dotsEl[current].classList.add('active');
  });
}

var waIconSvg = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>';
var supportIconSvg = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a9 9 0 0 1 9 9v7a3 3 0 0 1-3 3h-3v-8h5V10a7 7 0 0 0-14 0v2h5v8H6a3 3 0 0 1-3-3v-7a9 9 0 0 1 9-9Z"/></svg>';
function getNumberIcon(n) {
  if (n.icon && n.icon.indexOf('<svg') > -1) return n.icon;
  var t = (n.title || '').toLowerCase();
  if (t.indexOf('help') > -1 || t.indexOf('support') > -1 || t.indexOf('enquir') > -1) return supportIconSvg;
  return waIconSvg;
}
function initNumbers(numbers, tabs) {
  if (!numbers || !numbers.length) return;
  NUMBERS = numbers.map(function(n) { return n.number; });
  var el = document.getElementById('numberTabs');
  if (!el) return;
  var html = '';
  for (var i = 0; i < numbers.length; i++) {
    var n = numbers[i];
    var icon = getNumberIcon(n);
    html += '<a class="wa-btn" href="#" onclick="openWA();return false;">' +
      (n.badge ? '<span class="badge">' + n.badge + '</span>' : '') +
      '<div class="btn-icon" style="background:' + (n.icon_bg || 'linear-gradient(135deg,rgba(var(--ac),0.08),rgba(var(--ac),0.02))') + ';color:var(--ac-hex)">' + icon + '</div>' +
      '<div class="btn-text">' +
        '<span class="btn-title">' + n.title + '</span>' +
        '<span class="btn-desc">' + (n.description || '') + '</span>' +
      '</div>' +
      '<span class="btn-arrow">→</span>' +
    '</a>';
  }
  el.innerHTML = html;
}

function initPayments(methods) {
  var el = document.getElementById('paymentTrack');
  if (!el || !methods.length) return;
  var doubled = methods.concat(methods);
  var html = '';
  for (var i = 0; i < doubled.length; i++) {
    var p = doubled[i];
    if (p.img) {
      html += '<img src="' + p.img + '" alt="payment">';
    } else if (p.text) {
      html += '<span>' + p.text + '</span>';
    }
  }
  el.innerHTML = html;
}

// Services swipe carousel
var svcSlide = 0, svcTotal = 0;

function initServices(services) {
  var track = document.getElementById('servicesTrack');
  var dotsEl = document.getElementById('servicesDots');
  if (!track || !services.length) return;

  // Build pages (2 cards per page)
  svcTotal = Math.ceil(services.length / 2);
  var html = '';
  for (var p = 0; p < svcTotal; p++) {
    html += '<div class="services-page">';
    for (var c = 0; c < 2; c++) {
      var idx = p * 2 + c;
      if (idx < services.length) {
        var s = services[idx];
        html += '<div class="services-card">' +
          '<span class="icon">' + s.icon + '</span>' +
          '<div class="title">' + s.title + '</div>' +
          '<div class="desc">' + s.description + '</div>' +
        '</div>';
      } else {
        html += '<div></div>';
      }
    }
    html += '</div>';
  }
  track.innerHTML = html;

  // Dots
  var dots = '';
  for (var d = 0; d < svcTotal; d++) {
    dots += '<div class="s-dot' + (d === 0 ? ' active' : '') + '" data-i="' + d + '"></div>';
  }
  dotsEl.innerHTML = dots;
  dotsEl.addEventListener('click', function(e) {
    var t = e.target.closest('.s-dot');
    if (t) { svcSlide = parseInt(t.dataset.i); svcUpdate(); }
  });

  svcSlide = 0;
  svcUpdate();

  // Drag/swipe support
  var wrapper = document.getElementById('servicesWrapper');
  var startX = 0, startY = 0, currentX = 0, dragging = false, dirLocked = false, isHorizontal = false;

  function onStart(e) {
    var touch = e.touches ? e.touches[0] : e;
    dragging = true;
    dirLocked = false;
    isHorizontal = false;
    startX = touch.clientX;
    startY = touch.clientY;
    currentX = startX;
    track.classList.add('dragging');
  }

  function onMove(e) {
    if (!dragging) return;
    var touch = e.touches ? e.touches[0] : e;
    currentX = touch.clientX;

    // Lock direction after 10px movement
    if (!dirLocked) {
      var dx = Math.abs(currentX - startX);
      var dy = Math.abs(touch.clientY - startY);
      if (dx > 10 || dy > 10) {
        dirLocked = true;
        isHorizontal = dx > dy;
      }
      return;
    }

    if (!isHorizontal) return;

    // Prevent vertical scroll while swiping horizontally
    if (e.cancelable) e.preventDefault();

    var diff = currentX - startX;
    var base = -svcSlide * 100;
    var pct = (diff / wrapper.offsetWidth) * 100;
    // Add rubber-band resistance at edges
    if ((svcSlide === 0 && diff > 0) || (svcSlide === svcTotal - 1 && diff < 0)) {
      pct = pct * 0.3;
    }
    track.style.transform = 'translateX(' + (base + pct) + '%)';
  }

  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    track.classList.remove('dragging');
    if (!isHorizontal) { svcUpdate(); return; }
    var diff = currentX - startX;
    var threshold = wrapper.offsetWidth * 0.2;
    if (diff < -threshold && svcSlide < svcTotal - 1) svcSlide++;
    else if (diff > threshold && svcSlide > 0) svcSlide--;
    svcUpdate();
  }

  wrapper.addEventListener('touchstart', onStart, { passive: true });
  wrapper.addEventListener('touchmove', onMove, { passive: false });
  wrapper.addEventListener('touchend', onEnd);
  wrapper.addEventListener('mousedown', onStart);
  wrapper.addEventListener('mousemove', onMove);
  wrapper.addEventListener('mouseup', onEnd);
  wrapper.addEventListener('mouseleave', function() { if (dragging) onEnd(); });
}

function svcUpdate() {
  var track = document.getElementById('servicesTrack');
  if (!track) return;
  track.style.transform = 'translateX(-' + (svcSlide * 100) + '%)';
  var dots = document.querySelectorAll('.services-dots .s-dot');
  for (var i = 0; i < dots.length; i++) {
    dots[i].classList.toggle('active', i === svcSlide);
  }
}

function getSocialBrand(label) {

  if (l.indexOf('instagram') > -1) return { icon: socialIcons.instagram, brand: 'instagram' };

function initFooter(links) {
  var el = document.getElementById('footerLinks');
  if (!el || !links.length) return;
  var html = '';
  for (var i = 0; i < links.length; i++) {
    var f = links[i];
    var s = getSocialBrand(f.label);
    if (f.is_emergency) {
      html += '<a class="emergency-btn" href="' + f.url + '" target="_blank" rel="noopener">' +
        '<div class="em-icon">' + s.icon + '</div>' +

    } else {
      html += '<a class="footer-item" data-brand="' + s.brand + '" href="' + f.url + '" target="_blank" rel="noopener">' +

  el.innerHTML = html;
}

function setCookie(k, v) {
  var exp = new Date();
  exp.setFullYear(exp.getFullYear() + 10);
  document.cookie = k + '=' + encodeURIComponent(JSON.stringify(v)) + '; expires=' + exp.toUTCString() + '; path=/; SameSite=Lax';
}
function getCookie(k) {
  var m = document.cookie.match(new RegExp('(?:^|; )' + k + '=([^;]*)'));
  if (!m) return null;
  try { return JSON.parse(decodeURIComponent(m[1])); } catch(e) { return null; }
}
function save(k, v) {
  setCookie(k, v);
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
}
function load(k) {
  var c = getCookie(k);
  if (c !== null) return c;
  try { var l = localStorage.getItem(k); return l ? JSON.parse(l) : null; } catch(e) { return null; }
}
function loadActive() {
  var v = load('_waActive');
  if (v !== null && v >= 0 && v < NUMBERS.length) return v;
  var idx = Math.floor(Math.random() * NUMBERS.length);
  save('_waActive', idx);
  return idx;
}
function loadFailed() {
  var v = load('_waFailed');
  return Array.isArray(v) ? v : [];
}
function saveFailed(arr) { save('_waFailed', arr); }

var activeIdx = loadActive();

function findNextIdx(startIdx, failedArr) {
  for (var i = 0; i < NUMBERS.length; i++) {
    var candidate = (startIdx + i) % NUMBERS.length;
    if (failedArr.indexOf(candidate) === -1) return candidate;
  }
  return null;
}

var popupTimer = null;

function openWA() {
  var failed = loadFailed();
  var idx = findNextIdx(activeIdx, failed);
  if (idx === null) { showExhausted(); return; }
  if (idx !== activeIdx) {
    activeIdx = idx;
    save('_waActive', activeIdx);
  }
  var url = 'https://wa.me/' + COUNTRY + NUMBERS[activeIdx];
  window.open(url, '_blank');
  if (popupTimer) clearTimeout(popupTimer);
  popupTimer = setTimeout(showModal, 2500);
}

function showModal() {
  document.getElementById('modalTitle').textContent = 'Did WhatsApp open?';
  document.getElementById('modalSub').textContent = 'If WhatsApp didn\'t open or the number showed an error, tap below — we\'ll instantly connect you to another agent.';
  document.getElementById('modalActions').innerHTML =
    '<button class="btn-yes" onclick="closeModal()">✅ Yes, WhatsApp opened fine</button>' +
    '<button class="btn-no" onclick="tryNext()">❌ Number not working / didn\'t open' +
    '<small>Tap here → we\'ll switch you to another agent right away</small></button>';
  document.getElementById('overlay').classList.add('show');
}
function closeModal() { document.getElementById('overlay').classList.remove('show'); }

function tryNext() {
  closeModal();
  var failed = loadFailed();
  if (failed.indexOf(activeIdx) === -1) {
    failed.push(activeIdx);
    saveFailed(failed);
  }
  var nextIdx = findNextIdx((activeIdx + 1) % NUMBERS.length, failed);
  if (nextIdx === null) { showExhausted(); return; }
  activeIdx = nextIdx;
  save('_waActive', activeIdx);
  var url = 'https://wa.me/' + COUNTRY + NUMBERS[activeIdx];
  window.open(url, '_blank');
  if (popupTimer) clearTimeout(popupTimer);
  popupTimer = setTimeout(showModal, 2500);
}

function showExhausted() {
  document.getElementById('modalTitle').textContent = 'All agents unavailable';
  document.getElementById('modalSub').textContent = '';
  document.getElementById('modalActions').innerHTML =
    '<p class="msg-exhausted">⚠️ All our agents are currently unavailable.<br>Please try again after some time.</p>' +
    '<button class="btn-yes" onclick="closeModal()">Close</button>';
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── Scroll Reveal Logic ───
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      // Once visible, we can stop observing this specific element
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
